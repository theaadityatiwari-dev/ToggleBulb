<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ToggleBulb</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #111;
      font-family: Arial, sans-serif;
      color: white;
    }

    .bulb {
      width: 120px;
      height: 180px;
      background: #444;
      border-radius: 60px 60px 40px 40px;
      position: relative;
      transition: 0.3s;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
    }

    .bulb::before {
      content: "";
      position: absolute;
      bottom: -25px;
      left: 35px;
      width: 50px;
      height: 25px;
      background: #222;
      border-radius: 5px;
    }

    /* ON state */
    .bulb.on {
      background: yellow;
      box-shadow: 0 0 50px yellow, 0 0 100px yellow;
    }

    button {
      margin-top: 30px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: #00c853;
      color: white;
      transition: 0.3s;
    }

    button:hover {
      background: #00a844;
    }
  </style>
</head>

<body>

  <div class="bulb" id="bulb"></div>
  <button onclick="toggleBulb()">Toggle Bulb</button>

  <script>
    function toggleBulb() {
      const bulb = document.getElementById("bulb");
      bulb.classList.toggle("on");
    }
  </script>

</body>
</html>
